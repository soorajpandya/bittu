paths:
  /api/v1/waitlist:
    post:
      tags:
      - Waitlist
      summary: Add To Waitlist
      description: Add a customer to the waitlist.
      operationId: add_to_waitlist_api_v1_waitlist_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../../../components/schemas.yaml#/AddEntryRequest
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: ../../../components/schemas.yaml#/HTTPValidationError
    get:
      tags:
      - Waitlist
      summary: Get Queue
      description: Get current waitlist queue.
      operationId: get_queue_api_v1_waitlist_get
      security:
      - HTTPBearer: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(waiting|notified|seated|skipped|cancelled)$
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: ../../../components/schemas.yaml#/HTTPValidationError
