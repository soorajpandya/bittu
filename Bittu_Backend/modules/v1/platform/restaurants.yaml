  /api/v1/restaurants:
    get:
      tags:
      - Restaurants
      summary: Get Restaurants
      description: Return the current user's restaurant(s).
      operationId: get_restaurants_api_v1_restaurants_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
    post:
      tags:
      - Restaurants
      summary: Create Restaurant
      description: 'Create a new restaurant for the current user.


        If a name is provided, creates a restaurant with that name and a default

        ''Main'' branch.  Otherwise falls back to the idempotent initialisation

        logic (one restaurant per user).'
      operationId: create_restaurant_api_v1_restaurants_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: ../../../components/schemas.yaml#/CreateRestaurantIn
              default: {}
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: ../../../components/schemas.yaml#/HTTPValidationError
      security:
      - HTTPBearer: []
  /api/v1/restaurants/{restaurant_id}:
    patch:
      tags:
      - Restaurants
      summary: Update Restaurant
      description: Partial-update a restaurant owned by the current user.
      operationId: update_restaurant_api_v1_restaurants__restaurant_id__patch
      security:
