<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ doc_title | default("Document") }}</title>
<style>
{% block extra_css %}{% endblock %}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Helvetica, Arial, sans-serif; color: #2D2D2D; font-size: 10px; line-height: 1.5; background: #F5F5F5; }
@page { size: A4; margin: 12mm; }
.page { background: #FFFFFF; padding: 40px 44px 30px 44px; }

/* ── Top accent line ── */
.accent-line { height: 3px; background: #E8DCDC; margin-bottom: 30px; }

/* ── Header area ── */
.header { margin-bottom: 6px; }
.header table { width: 100%; }
.header td { vertical-align: top; }

.doc-title { font-size: 28px; font-style: italic; color: #2D2D2D; font-weight: 400; margin-bottom: 14px; }

.doc-meta-row { margin-bottom: 20px; }
.doc-meta-row table { width: 100%; }
.doc-meta-row td { vertical-align: top; }
.meta-label { font-size: 7.5px; text-transform: uppercase; letter-spacing: 1px; color: #999999; font-weight: 700; margin-bottom: 3px; }
.meta-value { font-size: 10px; font-weight: 400; color: #2D2D2D; }
.meta-value-bold { font-size: 10px; font-weight: 700; color: #2D2D2D; }

.org-logo { width: 60px; height: 60px; object-fit: contain; }

/* ── Address blocks ── */
.addresses { margin-bottom: 22px; }
.addresses table { width: 100%; }
.addresses td { vertical-align: top; padding-right: 14px; }
.addr-label { font-size: 7.5px; text-transform: uppercase; letter-spacing: 1px; color: #999999; font-weight: 700; margin-bottom: 6px; }
.addr-name { font-weight: 700; font-size: 10.5px; color: #2D2D2D; margin-bottom: 2px; }
.addr-detail { font-size: 9.5px; color: #555555; line-height: 1.7; }

/* ── Divider ── */
.divider { height: 1px; background: #E8DCDC; margin: 4px 0 16px 0; }
.divider-light { height: 1px; background: #EEEEEE; margin: 0; }

/* ── Items table ── */
.items-table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
.items-table thead th {
    padding: 10px 8px; text-align: left;
    font-size: 8px; text-transform: uppercase; letter-spacing: 0.6px;
    font-weight: 700; color: #555555;
    border-bottom: 2px solid #E8DCDC;
}
.items-table tbody td {
    padding: 12px 8px; font-size: 10px; color: #2D2D2D;
    border-bottom: 1px solid #F0F0F0;
}
.items-table tbody tr:last-child td { border-bottom: none; }
.items-table .item-name { font-weight: 400; color: #2D2D2D; }
.items-table .item-desc { color: #888888; font-size: 8.5px; }
.items-table .item-hsn { color: #AAAAAA; font-size: 8px; }
.items-table .qty, .items-table .rate, .items-table .tax, .items-table .amount { text-align: right; }
.items-table thead th.qty, .items-table thead th.rate,
.items-table thead th.tax, .items-table thead th.amount { text-align: right; }

/* ── Totals ── */
.totals-section { margin-top: 4px; margin-bottom: 10px; }
.totals-section table { margin-left: auto; width: 240px; }
.totals-section td { padding: 4px 0; font-size: 10px; }
.totals-section td.label-col { color: #777777; font-weight: 400; }
.totals-section td.value-col { text-align: right; font-weight: 400; color: #2D2D2D; }

/* ── Footer section: terms + total ── */
.bottom-divider { height: 1px; background: #E8DCDC; margin: 16px 0; }

.bottom-section { margin-top: 0; }
.bottom-section table { width: 100%; }
.bottom-section td { vertical-align: top; }

.terms-block {}
.terms-label { font-size: 7.5px; text-transform: uppercase; letter-spacing: 1px; color: #999999; font-weight: 700; margin-bottom: 4px; }
.terms-text { font-size: 9px; color: #777777; line-height: 1.6; }

.invoice-total-block { text-align: right; }
.invoice-total-label { font-size: 7.5px; text-transform: uppercase; letter-spacing: 1px; color: #999999; font-weight: 700; margin-bottom: 4px; }
.invoice-total-value { font-size: 22px; font-weight: 700; color: #2D2D2D; }

/* ── Notes ── */
.notes-section { margin-top: 14px; }
.notes-section h4 { font-size: 7.5px; text-transform: uppercase; letter-spacing: 1px; color: #999999; font-weight: 700; margin-bottom: 4px; }
.notes-section p { font-size: 9px; color: #777777; line-height: 1.6; }

/* ── Footer bar ── */
.footer {
    margin-top: 30px; padding-top: 12px;
    border-top: 1px solid #EEEEEE;
    text-align: center; color: #BBBBBB; font-size: 7.5px;
}
.footer .org-name { color: #777777; font-weight: 600; }

/* ── Status badges ── */
.doc-status {
    display: inline-block; padding: 2px 10px; font-size: 8px; font-weight: 700;
    text-transform: uppercase; border-radius: 2px; letter-spacing: 0.5px; margin-top: 4px;
}
.status-draft { background: #FFF8E1; color: #B8860B; }
.status-sent { background: #E3F2FD; color: #1565C0; }
.status-paid { background: #E8F5E9; color: #2E7D32; }
.status-overdue { background: #FFEBEE; color: #C62828; }
.status-void { background: #F5F5F5; color: #757575; }
.status-default { background: #F5F5F5; color: #555555; }
</style>
</head>
<body>
<div class="page">
  <div class="accent-line"></div>
  {% block content %}{% endblock %}
  <div class="footer">
    <span class="org-name">{{ org.name | default("") }}</span>
  </div>
</div>
</body>
</html>
