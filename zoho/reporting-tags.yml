openapi: 3.0.0
info:
  title: Reporting Tags
  description: Reporting tags are custom financial labels you add to financial transactions to categorize them  by department, cost center, business unit, or any other way based on business needs for reporting. In this document,  you'll learn how to create and manage reporting tags for the specific requirements that your organization needs.
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/books/v3
    description: API Endpoint
tags:
  - name: reporting-tags
    description: Reporting Tags Module
paths:
  /reportingtags:
    get:
      tags:
        - reporting-tags
      operationId: get_tags
      summary: List of all Reporting Tags
      description: Get a list of all reporting tags in the preferred order that you can set.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reporting_tags:
                    $ref: '#/components/schemas/list-reporting-tags-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    post:
      tags:
        - reporting-tags
      operationId: create_tag
      summary: Create Reporting Tag
      description: Create a reporting tag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-reporting-tag-request'
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/reporting-tags-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /reportingtags/{tag_id}:
    post:
      tags:
        - reporting-tags
      operationId: mark_default_option
      summary: Mark an option as default for a reporting tag
      description: Mark an option as the default option or clear default option for a reporting tag.
      parameters:
        - name: default_option_id
          in: query
          description: ID of the option to be marked as default. If this parameter is not sent or sent empty, the current default option of the tag will be removed.
          required: true
          schema:
            $ref: '#/components/schemas/option_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mark-default_option-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    put:
      tags:
        - reporting-tags
      operationId: update_tag
      summary: Update Reporting Tag
      description: Update a reporting tag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-reporting-tag-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/reporting-tags-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    delete:
      tags:
        - reporting-tags
      operationId: delete_tag
      summary: Delete a reporting tag
      description: Delete a reporting tag. If there are any usages of the reporting tag in transactions,  custom views or workflows, you will not be able to delete the tag.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The reporting tag has been deleted successfully.
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.DELETE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
  /reportingtags/{tag_id}/options:
    put:
      tags:
        - reporting-tags
      operationId: update_tag_options
      summary: Update Reporting Tag Options
      description: Create, update or delete the options of a reporting tag. Reorder and arrange them in an hierarchical structure as per your organization requirements. <br><b>NOTE:</b> <br><ol> <li>An option cannot be a child option beyond five hierarchical level.</li> <li>The overall children of an option cannot exceed 500 options.</li></ol>
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-options-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-options-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
  /reportingtags/{tag_id}/criteria:
    put:
      tags:
        - reporting-tags
      operationId: update_tag_criteria
      summary: Update Reporting Tag - Visibility Conditions
      description: Update the visibility conditions (or filter in some places) of a reporting tag. You can set other tags or location as filters for a tag. Check our help document to know about the requirements of a tag to be associated as a filter to another tag.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-criteria-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/update-criteria-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
  /reportingtags/{tag_id}/active:
    post:
      tags:
        - reporting-tags
      operationId: active_tag
      summary: Mark Reporting Tag as active
      description: Mark a reporting tag as active so that you can use it on entities which you allowed.  A newly created tag will be in draft state. Use this to mark that tag as ready.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The reporting tag has been activated.
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
  /reportingtags/{tag_id}/inactive:
    post:
      tags:
        - reporting-tags
      operationId: inactive_tag
      summary: Mark Reporting Tag as inactive
      description: Mark a reporting tag as inactive.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The reporting tag has been deactivated.
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
  /reportingtags/{tag_id}/option/(\d+)/active:
    post:
      tags:
        - reporting-tags
      operationId: active_tag_option
      summary: Mark an option as active
      description: Mark a reporting tag's option as active.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The reporting tag option has been activated.
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
      - $ref: '#/components/parameters/path_option_id'
  /reportingtags/{tag_id}/option/(\d+)/inactive:
    post:
      tags:
        - reporting-tags
      operationId: inactive_tag_option
      summary: Mark an option as inactive
      description: Mark a reporting tag's option as inactive.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: The reporting tag option has been deactivated.
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/path_tag_id'
      - $ref: '#/components/parameters/path_option_id'
  /reportingtags/options:
    get:
      tags:
        - reporting-tags
      operationId: get_all_tag_options
      summary: Get Reporting Tags Options Detail Page
      description: Get the options and its criteria details of a reporting tag. For each page, you can retrieve only 200 options.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/options_detail_page_response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/query_tag_id'
  /reportingtags/(\d+)/options/all:
    get:
      tags:
        - reporting-tags
      operationId: all_tag_options
      summary: Get all Options
      description: Get all options for a reporting tag.
      parameters:
        - name: show_untagged
          in: query
          description: '''untagged'' will be included in the response if this parameter is set to true.'
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/all_options_response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
      - $ref: '#/components/parameters/query_tag_id'
  /reportingtags/reorder:
    put:
      tags:
        - reporting-tags
      operationId: reorder_tags
      summary: Reorder Reporting Tags
      description: Reorder the reporting tags in your organization. The order of tags will be followed in transactions and reports.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tag_ids:
                  description: List of reporting tag IDs in the desired order
                  type: array
                  items:
                    $ref: '#/components/schemas/tag_id'
                  example:
                    - '460000000038080'
                    - '460000000038081'
                    - '460000000038082'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: The reporting tags have been reordered successfully.
                  tags:
                    $ref: '#/components/schemas/list-reporting-tags-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
components:
  parameters:
    organization_id:
      name: organization_id
      description: ID of the organization
      in: query
      required: true
      schema:
        type: string
      example: '10234695'
    path_tag_id:
      name: tag_id
      in: path
      description: ID of the reporting tag
      required: true
      schema:
        type: string
      example: '460000000038080'
    query_tag_id:
      name: tag_id
      in: query
      description: ID of the reporting tag
      required: true
      schema:
        type: string
      example: '460000000038080'
    path_option_id:
      name: option_id
      in: path
      description: ID of a reporting tag's option
      required: true
      schema:
        type: string
      example: '460000000038081'
  schemas:
    is_tag_mandatory:
      description: Boolean to check if the tag is mandatory
      type: boolean
      example: false
    tags:
      description: Array of reporting tags associated with this line item. Each tag consists of a `tag_id` and `option_id` that categorize the line item for reporting and analytics purposes. Tags help organize and filter data across reports and enable detailed business intelligence analysis.
      type: array
      items:
        type: object
        properties:
          tag_id:
            $ref: '#/components/schemas/tag_id'
          tag_option_id:
            $ref: '#/components/schemas/option_id'
    tags_response:
      description: Array of reporting tags associated with this line item in the response. Each tag consists of a `tag_id`, `tag_name`, `option_id`, and `option_name` that categorize the line item for reporting and analytics purposes. Tags help organize and filter data across reports and enable detailed business intelligence analysis.
      type: array
      items:
        type: object
        properties:
          tag_id:
            $ref: '#/components/schemas/tag_id'
          tag_name:
            $ref: '#/components/schemas/tag_name'
          tag_option_id:
            $ref: '#/components/schemas/option_id'
          tag_option_name:
            $ref: '#/components/schemas/option_name'
          is_tag_mandatory:
            $ref: '#/components/schemas/is_tag_mandatory'
    tag_id:
      description: Tag ID
      type: string
      example: '460000000038080'
    tag_name:
      description: Tag Name
      type: string
      example: Business Unit
    tag_order:
      description: The order in which the tag appears
      type: integer
      example: 1
    description:
      description: Description
      type: string
      example: Description of the reporting tag
    is_mandatory:
      description: Is Mandatory
      type: boolean
      example: false
    is_class:
      description: Is segmentation enabled for the tag
      type: boolean
      example: false
    is_draft:
      description: Is tag still in draft state
      type: boolean
      example: false
    option_id:
      description: Option ID
      type: string
      example: '460000000038081'
    option_name:
      description: Option Name
      type: string
      example: Sales
    depth:
      description: Depth or how much indentation required of the option in the hierarchy
      type: integer
      example: 1
    filter_tag_id:
      type: string
      description: Filter tag ID. If the filter 'type' is location, <code>null</code> should be passed
      example: '460000000038081'
    filter_type:
      description: 'Type of filter entity. <br>Allowed values: Tag <code>tag</code> and Location <code>location</code>. <br>'
      type: string
      example: tag
    filter_option_id:
      description: 'Option ID for the filter. It can be an option ID or flags.  <br>Allowed flags: <code>all</code> - Instead of selecting all options, you can send this flag to denote all options of the filter tag or location are selected for the filter to the respective tag. <code>untagged</code> - When you want to show an option when no option is selected for the filter tag. <b>Note: This flag cannot be used for location filter.</b>'
      type: string
      example: '460000000038081'
    filter_option_name:
      description: 'Option Name for the filter. It can be an option name or flags.  <br>Allowed flags: <code>All</code> - Instead of selecting all options, you can send this flag to denote all options of the filter tag or location are selected for the filter to the respective tag. <code>Untagged</code> - When you want to show an option when no option is selected for the filter tag. <b>Note: This flag cannot be used for location filter.</b>'
      type: string
      example: Sales
    tag_is_active:
      type: boolean
      description: Is the tag active
      example: true
    option_is_default:
      type: boolean
      description: Is the option default for the tag
      example: true
    option_is_active:
      type: boolean
      description: Is the option active for the tag
      example: true
    entities:
      description: Entities that can only be enabled or disabled which can also be called as mono-preference entities. <br><i>Note:</i>If you have Payroll joined then <code>journal</code> will be sent in this list instead of <code>multiple_preference_entities</code>
      type: array
      items:
        type: object
        properties:
          entity_name:
            description: 'Entity Name<br>Possible Values:  <br>Customer - <code>customers</code>,  <br>Vendor - <code>vendors</code>,  <br>Item - <code>items</code>,  <br>Banking - <code>banking</code> <br>Fixed Asset - <code>fixed_asset</code>'
            type: string
            enum:
              - customers
              - vendors
              - items
              - banking
          is_enabled:
            description: Is Enabled
            type: boolean
            example: true
      example:
        - entity_name: customers
          is_enabled: true
        - entity_name: vendors
          is_enabled: true
        - entity_name: items
          is_enabled: true
        - entity_name: fixed_asset
          is_enabled: true
        - entity_name: banking
          is_enabled: true
    multi_preference_entities:
      type: object
      properties:
        preference:
          description: Preference type. Currently, only <code>'transaction' and 'line_item'</code> is supported for this node
          type: string
          example: line_item
        entities:
          description: Entities that can only be enabled or disabled
          type: array
          items:
            type: object
            properties:
              entity_name:
                description: 'Entity Name. Possible Values:  <br>Sales - <code>sales</code>,  <br>Purchases - <code>purchases</code>,  <br>Journal - <code>journals</code>,  <br>Inventory Adjustment - <code>inventory_adjustment</code>'
                type: string
                enum:
                  - Sales
                  - Purchases
                  - Journal
                  - Inventory Adjustment
              is_enabled:
                description: Is Enabled
                type: boolean
                example: true
      example:
        preference: line_item
        entities:
          - entity_name: sales
            is_enabled: true
          - entity_name: purchases
            is_enabled: true
          - entity_name: journals
            is_enabled: false
          - entity_name: inventory_adjustment
            is_enabled: false
    criteria_tags:
      description: Filter tags and location
      type: array
      items:
        type: object
        properties:
          tag_id:
            $ref: '#/components/schemas/filter_tag_id'
          type:
            $ref: '#/components/schemas/filter_type'
    criteria_options:
      description: Options for criteria
      type: array
      items:
        type: object
        properties:
          option_id:
            $ref: '#/components/schemas/option_id'
          criteria_options:
            description: List containing filter tags and location
            type: array
            items:
              type: object
              properties:
                tag_id:
                  $ref: '#/components/schemas/filter_tag_id'
                type:
                  $ref: '#/components/schemas/filter_type'
                options:
                  description: Options selected for the criteria
                  type: array
                  items:
                    $ref: '#/components/schemas/option_id'
    tag_response:
      type: object
      properties:
        tag_id:
          $ref: '#/components/schemas/tag_id'
        tag_name:
          $ref: '#/components/schemas/tag_name'
        description:
          $ref: '#/components/schemas/description'
        is_mandatory:
          $ref: '#/components/schemas/is_mandatory'
        entities:
          $ref: '#/components/schemas/entities'
        multi_preference_entities:
          $ref: '#/components/schemas/multi_preference_entities'
    list-reporting-tags-response:
      type: array
      items:
        type: object
        properties:
          tag_id:
            $ref: '#/components/schemas/tag_id'
          tag_name:
            $ref: '#/components/schemas/tag_name'
          tag_order:
            $ref: '#/components/schemas/tag_order'
          description:
            $ref: '#/components/schemas/description'
          is_active:
            $ref: '#/components/schemas/tag_is_active'
          is_mandatory:
            $ref: '#/components/schemas/is_mandatory'
          is_class:
            $ref: '#/components/schemas/is_class'
          is_draft:
            $ref: '#/components/schemas/is_draft'
      example:
        - tag_id: '460000000038080'
          tag_name: Business Unit
          tag_order: 1
          description: Description of the reporting tag
          is_active: true
          is_mandatory: false
          is_class: false
          is_draft: false
        - tag_id: '460000000038081'
          tag_name: Sales Region
          tag_order: 2
          description: Description of the reporting tag
          is_active: true
          is_mandatory: false
          is_class: true
          is_draft: false
        - tag_id: '460000000038082'
          tag_name: Department
          tag_order: 3
          description: Description of the reporting tag
          is_active: false
          is_mandatory: true
          is_class: false
          is_draft: true
    update-reporting-tag-request:
      required:
        - tag_name
        - entities
        - multi_preference_entities
      type: object
      properties:
        tag_name:
          $ref: '#/components/schemas/tag_name'
        description:
          $ref: '#/components/schemas/description'
        is_mandatory:
          $ref: '#/components/schemas/is_mandatory'
        entities:
          $ref: '#/components/schemas/entities'
        multi_preference_entities:
          $ref: '#/components/schemas/multi_preference_entities'
    update-options-request:
      required:
        - options
      type: object
      properties:
        options:
          type: array
          description: List of options for the reporting tag.
          items:
            type: object
            properties:
              option_name:
                $ref: '#/components/schemas/option_name'
              option_id:
                $ref: '#/components/schemas/option_id'
              is_active:
                $ref: '#/components/schemas/option_is_active'
              is_default:
                $ref: '#/components/schemas/option_is_default'
              children:
                type: array
                description: Child options of an option
                items:
                  type: object
                  properties:
                    option_id:
                      description: Option ID
                      type: string
                      example: '460000000038082'
                    option_name:
                      description: Option Name
                      type: string
                      example: Sales - East
                    is_active:
                      $ref: '#/components/schemas/option_is_active'
                    is_default:
                      $ref: '#/components/schemas/option_is_default'
      example:
        options:
          - option_id: '460000000038082'
            option_name: ES-2003
            is_active: true
            is_default: true
            children:
              - option_id: '460000000038088'
                children: []
                option_name: ES-2003 Sec - B
                is_active: true
              - option_name: ES-2003 Sec - C
                is_active: true
                children:
                  - children: []
                    option_name: EES-2003
                    is_active: true
          - option_id: '460000000038084'
            option_name: ES-N-2016
            is_active: true
            is_default: false
            children: []
          - option_id: '460000000038086'
            option_name: HS & ES-N
            is_active: true
            is_default: false
            children: []
    update-options-response:
      type: object
      properties:
        message:
          type: string
          example: Options updated successfully
    reporting-tags-response:
      type: object
      properties:
        tag:
          $ref: '#/components/schemas/tag_response'
    update-criteria-request:
      required:
        - criteria_tags
        - options
      type: object
      properties:
        criteria_tags:
          $ref: '#/components/schemas/criteria_tags'
        options:
          $ref: '#/components/schemas/criteria_options'
    update-criteria-response:
      type: object
      properties:
        message:
          type: string
          example: The criteria has been updated.
    update-segmentation-response:
      type: object
      properties:
        message:
          type: string
          example: Segmentation modified successfully.
    options-editpage-response:
      type: object
      properties:
        message:
          type: string
          example: success
        is_class:
          $ref: '#/components/schemas/is_class'
        is_draft:
          $ref: '#/components/schemas/is_draft'
        is_filter_configured:
          type: boolean
          description: If filter is configured for this tag, it will be <code>true</code>
          example: true
        tag_id:
          $ref: '#/components/schemas/tag_id'
        tag_name:
          $ref: '#/components/schemas/tag_name'
        options:
          type: array
          description: List of options for the reporting tag.
          items:
            type: object
            properties:
              option_id:
                $ref: '#/components/schemas/option_id'
              option_name:
                $ref: '#/components/schemas/option_name'
              is_active:
                $ref: '#/components/schemas/option_is_active'
              is_default:
                $ref: '#/components/schemas/option_is_default'
              children:
                type: array
                description: Child options of an option
                items:
                  type: object
                  properties:
                    option_id:
                      description: Option ID
                      type: string
                      example: '460000000038082'
                    option_name:
                      description: Option Name
                      type: string
                      example: Sales - East
                    is_active:
                      $ref: '#/components/schemas/option_is_active'
                    is_default:
                      $ref: '#/components/schemas/option_is_default'
    editpage-segmentation-response:
      type: object
      properties:
        is_class:
          $ref: '#/components/schemas/is_class'
        is_draft:
          $ref: '#/components/schemas/is_draft'
        tag_id:
          $ref: '#/components/schemas/tag_id'
        tag_name:
          $ref: '#/components/schemas/tag_name'
    dependent_tags:
      type: array
      description: The tags and location that is associated as filter for the tag
      items:
        type: object
        properties:
          dependent_id:
            type: string
            description: Dependent Tag's ID. If the dependent is location, value will be empty
            example: 460000000038081
          dependent_name:
            type: string
            description: Dependent Tag's Name. If the dependent is location, value will be <code>Location</code>
            example: Sales
          dependent_order:
            type: integer
            description: The order in which the dependent tags appear. If the dependent is location, value will be empty
            example: 1
          dependent_type:
