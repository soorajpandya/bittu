              order:
                type: integer
                description: Display order of the option.
                example: 1
              id:
                type: string
                description: ID of an existing dropdown option. Required for <code>update</code> action.
              is_active:
                type: boolean
                description: Whether the option is active.
                example: true
        option_ids:
          type: string
          description: Comma-separated list of dropdown option IDs to remove. Required when <code>action</code> is <code>remove</code>.
          example: 982000000567001,982000000567002
