components:
  parameters:
    organization_id:
      name: organization_id
      description: ID of the organization.
      in: query
      required: true
      schema:
        type: string
      example: '10234695'
    page:
      name: page
      in: query
      description: Page number to be fetched. Default value is 1.
      required: false
      schema:
        type: integer
        default: 1
      example: 1
    per_page:
      name: per_page
      in: query
      description: Number of records to be fetched per page.
      required: false
      schema:
        type: integer
        default: 10
      example: 10
    sort_order:
      name: sort_order
      in: query
      description: 'Sort order. Allowed Values: <code>A</code> (Ascending), <code>D</code> (Descending)'
      required: false
      schema:
        type: string
        enum:
          - A
          - D
  schemas:
    workflow:
      type: object
      properties:
        workflow_id:
          description: Unique identifier of the workflow.
          type: string
          example: '460000000038001'
        workflow_name:
          description: Name of the workflow rule.
          type: string
          example: Send reminder on due date
        placeholder:
          description: Placeholder identifier of the workflow.
          type: string
        entity:
          description: The entity type this workflow applies to.
          type: string
          example: invoice
        sub_entities:
          description: Sub-entity types for the workflow.
          type: string
        rule_type:
          description: The trigger type for the workflow.
          type: string
          example: add
        description:
          description: Description of the workflow.
          type: string
        is_active:
          description: Whether the workflow is currently active.
          type: boolean
          example: true
        is_from_plugin:
          description: Whether the workflow was created from a plugin.
          type: boolean
          example: false
        created_time:
          description: Timestamp when the workflow was created.
          type: string
          example: 2025-01-15T10:30:00+0530
        is_locked:
          description: Whether the workflow is locked.
          type: boolean
          example: false
        lock_reason:
          description: Reason for locking the workflow.
          type: string
    custom-trigger:
      type: object
      properties:
        customtrigger_id:
          description: Unique identifier of the custom trigger.
          type: string
          example: '460000000050001'
        name:
          description: Name of the custom trigger.
          type: string
          example: Invoice Custom Trigger
        placeholder:
          description: Placeholder identifier of the custom trigger.
          type: string
        entity:
          description: The entity type this trigger applies to.
          type: string
          example: invoice
        created_time:
          description: Timestamp when the trigger was created.
          type: string
        is_from_plugin:
          description: Whether the trigger was created from a plugin.
          type: boolean
          example: false
        service_name:
          description: Name of the service associated with the trigger.
          type: string
        related_rules:
          description: Workflow rules related to this trigger.
          type: array
          items:
            type: object
        zapikey_url:
          description: ZAPI key URL for the trigger.
          type: string
        oauth_url:
          description: OAuth URL for the trigger.
          type: string
    retry-policy:
      type: object
      properties:
        policy_id:
          description: Unique identifier of the retry policy.
          type: string
          example: '460000000060001'
        policy_name:
          description: Name of the retry policy.
          type: string
          example: Default Retry Policy
        retry_type:
          description: Type of retry strategy.
          type: string
          enum:
            - fixed
            - varying_linear
            - varying_exponential
            - honor_retry_after
          example: fixed
        base_interval:
          description: Base interval between retries.
          type: integer
          example: 5
        base_interval_unit:
          description: Unit for the base interval.
          type: string
          enum:
            - minutes
            - hours
          example: minutes
        interval_modifier:
          description: Modifier applied to the interval between retries.
          type: integer
        retry_count:
          description: Maximum number of retry attempts (1-20).
          type: integer
          example: 3
        created_time:
          description: Timestamp when the policy was created.
          type: string
    retry-policy-detail:
      type: object
      properties:
        policy_id:
          description: Unique identifier of the retry policy.
          type: string
          example: '460000000060001'
        policy_name:
          description: Name of the retry policy.
          type: string
        action_type:
          description: Type of action the policy applies to.
          type: string
          enum:
            - webhook
            - custom_function
        retry_type:
          description: Type of retry strategy.
          type: string
          enum:
            - fixed
            - varying_linear
            - varying_exponential
            - honor_retry_after
        base_interval:
          description: Base interval between retries.
          type: integer
        base_interval_unit:
          description: Unit for the base interval.
          type: string
          enum:
            - minutes
            - hours
        interval_modifier:
          description: Modifier applied to the interval between retries.
          type: integer
        retry_count:
          description: Maximum number of retry attempts (1-20).
          type: integer
    create-workflow-request:
      type: object
      required:
        - workflow_name
        - entity
        - rule_type
      properties:
        workflow_name:
          description: Name of the workflow rule.
          type: string
          example: Send reminder on due date
        description:
          description: Description of the workflow. Max-len [1000]
          type: string
        rule_type:
          description: Trigger type for the workflow.
          type: string
          enum:
            - add
            - edit
            - add_edit
            - delete
            - once
            - monthly
            - yearly
            - custom_trigger
            - weekly
            - daily
            - submit
            - approve
            - recall
            - reimburse
            - reject
            - approved_and_forwarded
            - undo_reimburse
            - close
            - trip_cancel
            - trip_option_added
            - trip_option_selected
            - trip_option_approved
            - trip_option_booked
            - trip_option_rejected
            - trip_option_cancelled
            - trip_option_revision_required
            - trip_option_rescheduled
            - trip_itinerary_rescheduled
            - trip_itinerary_cancelled
            - trip_itinerary_added
            - request_assigned
            - request_onhold
            - request_closed
            - onhold
            - processed
            - paid
            - advance_void
            - draft
            - submitted_for_approval
            - approved
            - recalled
            - rejected
            - completed
            - payment_initiated
            - payment_initiation_failed
            - failed
            - combined
            - purchase_request_cancelled
          example: add
        placeholder:
          description: Placeholder identifier of the workflow.
          type: string
        entity:
          description: The entity type this workflow applies to (e.g., invoice, bill, contact).
          type: string
          example: invoice
        sub_entities:
          description: Sub-entity types for the workflow.
          type: array
          items:
            type: object
        field_update:
          description: 'Field update conditions for the workflow trigger. Max items: 1000.'
          type: array
          maxItems: 1000
          items:
            type: object
        field_update_comparator:
          description: 'Comparator for field update conditions. Allowed Values: <code>and</code>, <code>or</code>, <code>any</code>, <code>except_or</code>, <code>except_and</code>'
          type: string
        date_field:
          description: Date field for time-based workflows.
          type: string
        time:
          description: Execution time for time-based workflows.
          type: string
        day_difference:
          description: Number of days/hours before or after the date field.
          type: integer
        day_difference_type:
          description: 'Whether the difference is before or after. Allowed Values: <code>before</code>, <code>after</code>'
          type: string
        day_difference_unit:
          description: 'Unit for day difference. Allowed Values: <code>hours</code>, <code>days</code>'
          type: string
        apply_rule_always:
          description: Whether to apply the rule every time the trigger condition is met.
          type: boolean
        rule:
          description: Criteria rule for the workflow.
          type: object
        events:
          description: 'Event bindings for the workflow. Max items: 1000.'
          type: array
          maxItems: 1000
          items:
            type: object
        instant_actions:
          description: 'List of instant actions to execute when the workflow triggers. Max items: 1000.'
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/workflow-action'
        time_based_actions:
          description: 'List of time-based actions for the workflow. Max items: 1000.'
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/workflow-time-based-action'
        sub_rules:
          description: 'Sub-rules with their own criteria and actions. Max items: 1000.'
          type: array
          maxItems: 1000
          items:
            type: object
        is_locked:
          description: Whether the workflow is locked.
          type: boolean
        lock_type:
          description: 'Type of lock. Allowed Values: <code>error</code>, <code>none</code>'
          type: string
        lock_reason:
          description: Reason for locking the workflow. Max-len [255]
          type: string
        is_hidden:
          description: Whether the workflow is hidden.
          type: boolean
        allowed_apps:
          description: Comma-separated list of allowed apps. Maximum 6 apps.
          type: string
          example: app1,app2
        is_draft:
          description: Whether the workflow is in draft mode.
          type: boolean
        trigger_id:
          description: ID of the custom trigger associated with this workflow.
          type: string
        trigger_ph:
          description: Placeholder of the custom trigger. Max-len [255]
          type: string
        entity_id:
          description: Entity ID for record-level workflows.
          type: string
        execution_timezone:
          description: 'Timezone for workflow execution. Allowed Values: <code>customer</code>, <code>default</code>'
          type: string
        is_custom_execution_time:
          description: Whether execution time is custom.
          type: boolean
    workflow-action:
      type: object
      properties:
        action_id:
          description: ID of the action.
          type: string
        action_type:
          description: 'Type of the action. Allowed Values: <code>alert</code>, <code>fieldupdate</code>, <code>webhook</code>, <code>customfunction</code>, <code>pushnotification</code>. Also supports custom action connector types matching the pattern <code>cac_&lt;connector_name&gt;</code>.'
          type: string
        action_ph:
          description: Placeholder of the action.
          type: string
        entity:
          description: Entity type for the action.
          type: string
        message_content:
          description: Message content for alert actions. Max-len [255]
          type: string
        alert_name:
          description: Name of the alert action.
          type: string
        pushnotification_name:
          description: Name of the push notification action.
          type: string
        email_template_id:
          description: ID of the email template for alert actions.
          type: string
        email_template_ph:
          description: Placeholder of the email template.
          type: string
        email_template:
          description: Inline email template details for alert actions.
          type: object
          properties:
            name:
              description: Name of the email template. Max-len [50]
              type: string
            from_address_id:
              description: ID of the from address.
              type: string
            placeholder:
              description: Placeholder of the email template.
              type: string
            type:
              description: Type of the email template.
              type: string
            from_address:
              description: From address ID.
              type: string
            body:
              description: Body content of the email. Max-len [64000]
              type: string
            subject:
              description: Subject of the email. Max-len [500]
              type: string
            is_default:
              description: Whether this is the default template.
              type: boolean
            cc_mail_ids:
              description: CC email addresses.
              type: array
              maxItems: 3
              items:
                type: object
            bcc_mail_ids:
              description: BCC email addresses.
              type: array
              maxItems: 3
              items:
                type: object
        recipients:
          description: List of recipients for alert actions.
          type: array
          maxItems: 1000
          items:
            type: object
        additional_recipients:
          description: Additional email recipients for alert actions.
          type: array
          maxItems: 1000
          items:
            type: object
        fieldupdate_name:
          description: Name of the field update action. Max-len [100]
          type: string
        field_name:
          description: Name of the field to update.
          type: string
        field_value:
          description: Value to set for the field. Max-len [100]
          type: string
        webhook_name:
          description: Name of the webhook action. Max-len [50]
          type: string
        method:
          description: 'HTTP method for webhook actions. Allowed Values: <code>POST</code>, <code>PUT</code>, <code>DELETE</code>'
          type: string
          enum:
            - POST
            - PUT
            - DELETE
        url:
          description: URL for the webhook action. Max-len [5000]
          type: string
        entity_parameters:
          description: Entity parameters for webhook actions.
          type: array
          maxItems: 1000
          items:
            type: object
        query_parameters:
          description: Query parameters for webhook actions.
          type: array
          maxItems: 1000
          items:
            type: object
        form_data:
          description: Form data for webhook actions.
          type: array
          maxItems: 1000
          items:
            type: object
        body_type:
          description: Content type of the webhook request body.
          type: string
        additional_parameters:
          description: Additional parameters for webhook actions.
          type: array
          maxItems: 1000
          items:
            type: object
        secret:
          description: Secret key for webhook signature verification. Min-len [12], Max-len [50]
          type: string
        headers:
          description: Custom headers for webhook actions.
          type: array
          maxItems: 1000
          items:
            type: object
        raw_data:
          description: Raw data body for webhook actions.
          type: string
        is_new_response_format:
          description: Whether to use the new response format for webhooks.
          type: boolean
        user_defined_format_name:
          description: User-defined format name for webhook payload. Max-len [100000]
          type: string
        user_defined_format_value:
          description: User-defined format value for webhook payload. Max-len [100000]
          type: string
        script:
          description: Script code for custom function actions.
          type: string
        function_name:
          description: Name of the custom function. Max-len [50]
          type: string
        description:
          description: Description of the custom function action. Max-len [100]
          type: string
        function_param:
          description: Parameters for the custom function.
          type: array
          maxItems: 1000
          items:
            type: object
        is_execute:
          description: Whether to execute the custom function immediately.
          type: boolean
        include_orgvariables_params:
          description: Whether to include organization variable parameters in the custom function.
          type: boolean
        connection_link_name:
          description: Connection link name for the custom function. Max-len [100]
          type: string
    template-input:
      type: object
      properties:
        uri:
          description: URI identifier for the template input. Max-len [200]
          type: string
        value:
          description: Value for the template input. Max-len [36000]
          type: string
    workflow-time-based-action:
      type: object
      properties:
        timetrigger_id:
          description: ID of the time trigger.
          type: string
        name:
          description: Name of the time-based action group.
          type: string
        field_type:
          description: Date field for the time trigger.
          type: string
        delay:
          description: Delay value.
          type: integer
        delay_unit:
          description: 'Unit for delay. Allowed Values: <code>hours</code>, <code>days</code>'
          type: string
        delay_type:
          description: 'Whether delay is before or after. Allowed Values: <code>before</code>, <code>after</code>'
          type: string
        actions:
          description: 'List of actions to execute. Max items: 1000.'
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/workflow-action'
    reorder-workflow-request:
      type: object
      required:
        - entity_type
        - execution_order
      properties:
        entity_type:
          description: The entity type for which to reorder workflows.
          type: string
          example: invoice
        execution_order:
          description: Array of workflow IDs in desired execution order.
          type: array
          items:
            type: string
        entity_id:
          description: Entity ID for record-level workflow reordering.
          type: string
    create-custom-trigger-request:
      type: object
      required:
        - entity
      properties:
        name:
          description: Name of the custom trigger.
          type: string
          example: Invoice Custom Trigger
        description:
          description: Description of the custom trigger.
          type: string
        entity:
          description: The entity type for the custom trigger.
          type: string
          example: invoice
        placeholder:
          description: Placeholder for the custom trigger.
          type: string
    create-retry-policy-request:
      type: object
      required:
        - retry_type
        - action_type
        - retry_count
      properties:
        policy_name:
          description: Name of the retry policy.
          type: string
          example: Default Retry Policy
        retry_type:
          description: 'Type of retry strategy. Allowed Values: <code>fixed</code>, <code>varying_linear</code>, <code>varying_exponential</code>, <code>honor_retry_after</code>'
          type: string
          enum:
            - fixed
            - varying_linear
            - varying_exponential
            - honor_retry_after
        action_type:
          description: 'Type of action the policy applies to. Allowed Values: <code>webhook</code>, <code>custom_function</code>'
          type: string
          enum:
            - webhook
            - custom_function
        base_interval:
          description: Base interval between retries.
          type: integer
        base_interval_unit:
          description: 'Unit for the base interval. Allowed Values: <code>minutes</code>, <code>hours</code>'
          type: string
          enum:
            - minutes
            - hours
        interval_modifier:
          description: Modifier applied to the interval between retries.
          type: integer
        retry_count:
          description: Maximum number of retry attempts (1-20).
          type: integer
          example: 3
    success-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: success
          readOnly: true
    list-workflows-response:
      type: object
      properties:
        code:
          type: integer
          example: 0
          readOnly: true
        message:
          type: string
          example: success
          readOnly: true
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/workflow'
    workflow-detail-response:
      type: object
      properties:
        code:
          type: integer
