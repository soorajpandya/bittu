openapi: 3.0.0
info:
  title: Workflows
  description: Workflows allow you to automate actions in your organization based on specific triggers. You can configure rules that execute actions like sending alerts, updating fields, triggering webhooks, or running custom functions when certain events occur.
  contact: {}
  version: 1.0.0
servers:
  - url: https://www.zohoapis.com/books/v3
    description: API Endpoint
tags:
  - name: workflows
    description: Workflows Module
  - name: custom-triggers
    description: Custom Triggers Module
  - name: retry-policies
    description: Retry Policies Module
  - name: workflow-logs
    description: Workflow Logs Module
  - name: workflow-reports
    description: Workflow Reports Module
paths:
  /settings/workflows:
    post:
      tags:
        - workflows
      operationId: create_workflow
      summary: Create a workflow
      description: Create a new workflow rule for automating actions based on triggers.
      parameters:
        - name: template_id
          in: query
          description: ID of the template to use for creating the workflow.
          required: false
          schema:
            type: string
        - name: entity_type
          in: query
          description: The entity type for the workflow.
          required: false
          schema:
            type: string
        - name: template_inputs
          in: query
          description: Template user input values when creating a workflow from a template. Pass as a JSON array.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/template-input'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-workflow-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflow-detail-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    get:
      tags:
        - workflows
      operationId: list_workflows
      summary: List workflows
      description: Get a list of all workflow rules configured in your organization.
      parameters:
        - name: filter_by
          in: query
          description: 'Filter workflows by entity type. Allowed Values: <code>Entity.All</code>, <code>Entity.Invoice</code>, <code>Entity.Bill</code>, etc.'
          required: false
          schema:
            type: string
        - name: is_summary
          in: query
          description: Return summary information only. Allowed values <code>true</code> and <code>false</code>.
          required: false
          schema:
            type: boolean
        - name: is_record_level
          in: query
          description: Filter record-level workflows. Allowed values <code>true</code> and <code>false</code>.
          required: false
          schema:
            type: boolean
        - name: entity_id
          in: query
          description: Filter workflows by entity ID.
          required: false
          schema:
            type: string
        - name: sort_column
          in: query
          description: 'Sort workflows by column. Allowed Values: <code>workflow_name</code>, <code>created_time</code>'
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-workflows-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /settings/workflows/{workflow_id}:
    get:
      tags:
        - workflows
      operationId: get_workflow
      summary: Get a workflow
      description: Get the details of a specific workflow rule.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflow-detail-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    put:
      tags:
        - workflows
      operationId: update_workflow
      summary: Update a workflow
      description: Update an existing workflow rule.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-workflow-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflow-detail-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    delete:
      tags:
        - workflows
      operationId: delete_workflow
      summary: Delete a workflow
      description: Delete an existing workflow rule.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.DELETE
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Unique identifier of the workflow.
        schema:
          type: string
        example: '460000000038001'
      - $ref: '#/components/parameters/organization_id'
  /settings/workflows/{workflow_id}/active:
    post:
      tags:
        - workflows
      operationId: activate_workflow
      summary: Activate a workflow
      description: Mark an existing workflow as active.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Unique identifier of the workflow.
        schema:
          type: string
        example: '460000000038001'
      - $ref: '#/components/parameters/organization_id'
  /settings/workflows/{workflow_id}/inactive:
    post:
      tags:
        - workflows
      operationId: deactivate_workflow
      summary: Deactivate a workflow
      description: Mark an existing workflow as inactive.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Unique identifier of the workflow.
        schema:
          type: string
        example: '460000000038001'
      - $ref: '#/components/parameters/organization_id'
  /settings/workflows/reorder:
    post:
      tags:
        - workflows
      operationId: reorder_workflows
      summary: Reorder workflows
      description: Change the execution order of workflow rules.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/reorder-workflow-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /settings/workflows/editpage:
    get:
      tags:
        - workflows
      operationId: get_workflow_editpage
      summary: Get workflow edit page data
      description: Get the data needed to render the workflow edit page, including entities, fields, actions, and related configurations.
      parameters:
        - name: entity
          in: query
          description: The entity type for the workflow.
          required: false
          schema:
            type: string
        - name: rule_id
          in: query
          description: ID of the workflow rule to edit.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflow-editpage-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /settings/automation/modulefilters:
    get:
      tags:
        - workflows
      operationId: get_module_filters
      summary: Get module filters
      description: Get the list of module filters available for workflow configuration.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                    readOnly: true
                  message:
                    type: string
                    example: success
                    readOnly: true
                  module_filters:
                    type: object
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /workflows/{workflow_id}/trigger:
    post:
      tags:
        - workflows
      operationId: trigger_workflow
      summary: Trigger a workflow
      description: Manually trigger a workflow for a specific entity.
      parameters:
        - name: entity_id
          in: query
          description: ID of the entity to trigger the workflow for.
          required: false
          schema:
            type: string
        - name: trigger_for_all_entities
          in: query
          description: Trigger the workflow for all matching entities. Allowed values <code>true</code> and <code>false</code>.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Unique identifier of the workflow.
        schema:
          type: string
        example: '460000000038001'
      - $ref: '#/components/parameters/organization_id'
  /workflows/{workflow_id}/triggeraction:
    post:
      tags:
        - workflows
      operationId: trigger_workflow_action
      summary: Trigger a workflow action
      description: Manually trigger time-based actions of a workflow for a specific entity.
      parameters:
        - name: entity_id
          in: query
          description: ID of the entity to trigger the action for.
          required: false
          schema:
            type: string
        - name: trigger_for_all_entities
          in: query
          description: Trigger the action for all matching entities. Allowed values <code>true</code> and <code>false</code>.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Unique identifier of the workflow.
        schema:
          type: string
        example: '460000000038001'
      - $ref: '#/components/parameters/organization_id'
  /settings/customtriggers:
    post:
      tags:
        - custom-triggers
      operationId: create_custom_trigger
      summary: Create a custom trigger
      description: Create a new custom trigger that can be used to invoke workflows via API.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-custom-trigger-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    get:
      tags:
        - custom-triggers
      operationId: list_custom_triggers
      summary: List custom triggers
      description: Get a list of all custom triggers configured in your organization.
      parameters:
        - name: filter_by
          in: query
          description: Filter custom triggers by entity type.
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-custom-triggers-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /settings/customtriggers/editpage:
    get:
      tags:
        - custom-triggers
      operationId: get_custom_trigger_editpage
      summary: Get custom trigger edit page data
      description: Get the data needed to render the custom trigger edit page.
      parameters:
        - name: trigger_id
          in: query
          description: ID of the custom trigger to edit.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                    readOnly: true
                  message:
                    type: string
                    example: success
                    readOnly: true
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /settings/customtriggers/{trigger_id}:
    put:
      tags:
        - custom-triggers
      operationId: update_custom_trigger
      summary: Update a custom trigger
      description: Update an existing custom trigger.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-custom-trigger-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    delete:
      tags:
        - custom-triggers
      operationId: delete_custom_trigger
      summary: Delete a custom trigger
      description: Delete an existing custom trigger.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.DELETE
    parameters:
      - name: trigger_id
        in: path
        required: true
        description: Unique identifier of the custom trigger.
        schema:
          type: string
        example: '460000000050001'
      - $ref: '#/components/parameters/organization_id'
  /settings/customtriggers/{trigger_id}/regenerate:
    put:
      tags:
        - custom-triggers
      operationId: regenerate_custom_trigger_apikey
      summary: Regenerate API key
      description: Regenerate the API key for a custom trigger.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    parameters:
      - name: trigger_id
        in: path
        required: true
        description: Unique identifier of the custom trigger.
        schema:
          type: string
        example: '460000000050001'
      - $ref: '#/components/parameters/organization_id'
  /settings/customtriggers/{customtrigger_ph}/execute:
    post:
      tags:
        - custom-triggers
      operationId: execute_custom_trigger
      summary: Execute a custom trigger
      description: Execute a custom trigger for a specific entity using OAuth or ZAPI key authentication.
      parameters:
        - name: entity_id
          in: query
          description: ID of the entity to execute the trigger for.
          required: true
          schema:
            type: string
        - name: is_debug
          in: query
          description: Enable debug mode for the execution. Allowed values <code>true</code> and <code>false</code>.
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.customtriggers.CREATE
    parameters:
      - name: customtrigger_ph
        in: path
        required: true
        description: Placeholder identifier of the custom trigger (e.g., ct_xxxxx).
        schema:
          type: string
        example: ct_abc123
      - $ref: '#/components/parameters/organization_id'
  /settings/customtriggers/{customtrigger_ph}/url/fetch:
    get:
      tags:
        - custom-triggers
      operationId: get_custom_trigger_url
      summary: Get custom trigger URL
      description: Get the ZAPI key URL for a custom trigger.
      parameters:
        - name: name_space
          in: query
          description: Namespace for the custom trigger URL.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                    readOnly: true
                  message:
                    type: string
                    example: success
                    readOnly: true
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - name: customtrigger_ph
        in: path
        required: true
        description: Placeholder identifier of the custom trigger (e.g., ct_xxxxx).
        schema:
          type: string
        example: ct_abc123
      - $ref: '#/components/parameters/organization_id'
  /retrypolicies:
    post:
      tags:
        - retry-policies
      operationId: create_retry_policy
      summary: Create a retry policy
      description: Create a new retry policy for webhook or custom function actions.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-retry-policy-request'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retry-policy-detail-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.CREATE
    get:
      tags:
        - retry-policies
      operationId: list_retry_policies
      summary: List retry policies
      description: Get a list of all retry policies configured in your organization.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: sort_column
          in: query
          description: 'Sort retry policies by column. Allowed Values: <code>created_time</code>'
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-retry-policies-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /retrypolicies/{policy_id}:
    get:
      tags:
        - retry-policies
      operationId: get_retry_policy
      summary: Get a retry policy
      description: Get the details of a specific retry policy.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retry-policy-detail-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    put:
      tags:
        - retry-policies
      operationId: update_retry_policy
      summary: Update a retry policy
      description: Update an existing retry policy.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-retry-policy-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/retry-policy-detail-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.UPDATE
    delete:
      tags:
        - retry-policies
      operationId: delete_retry_policy
      summary: Delete a retry policy
      description: Delete an existing retry policy.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success-response'
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.DELETE
    parameters:
      - name: policy_id
        in: path
        required: true
        description: Unique identifier of the retry policy.
        schema:
          type: string
        example: '460000000060001'
      - $ref: '#/components/parameters/organization_id'
  /reports/workflowlogs:
    get:
      tags:
        - workflow-logs
      operationId: list_workflow_logs
      summary: List workflow logs
      description: Get a list of workflow execution logs.
      parameters:
        - name: entity_type
          in: query
          description: Filter logs by entity type.
          required: false
          schema:
            type: string
        - name: workflow_id
          in: query
          description: Filter logs by workflow ID.
          required: false
          schema:
            type: string
        - name: triggered_by
          in: query
          description: Filter logs by the user who triggered the workflow.
          required: false
          schema:
            type: string
        - name: entity_ids
          in: query
          description: Comma-separated list of entity IDs to filter logs.
          required: false
          schema:
            type: string
        - name: user_action
          in: query
          description: 'Filter logs by user action. Allowed Values: <code>created</code>, <code>edited</code>, <code>deleted</code>, <code>system</code>'
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: 'Filter logs by execution status. Allowed Values: <code>executed</code>, <code>scheduled</code>, <code>skipped</code>'
          required: false
          schema:
            type: string
        - name: filter_by
          in: query
          description: 'Filter logs by date range. Allowed Values: <code>TransactionDate.Today</code>, <code>TransactionDate.ThisWeek</code>, <code>TransactionDate.ThisMonth</code>, <code>TransactionDate.ThisQuarter</code>, <code>TransactionDate.ThisYear</code>, <code>TransactionDate.CustomDate</code>, etc.'
          required: false
          schema:
            type: string
        - name: from_date
          in: query
          description: Start date for custom date filter (yyyy-MM-dd).
          required: false
          schema:
            type: string
          example: '2025-01-01'
        - name: to_date
          in: query
          description: End date for custom date filter (yyyy-MM-dd).
          required: false
          schema:
            type: string
          example: '2025-12-31'
        - name: sort_column
          in: query
          description: 'Sort logs by column. Allowed Values: <code>date</code>, <code>workflow_name</code>, <code>timestamp_formatted</code>'
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/sort_order'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                    readOnly: true
                  message:
                    type: string
                    example: success
                    readOnly: true
                  workflow_logs_details:
                    type: array
                    items:
                      type: object
                  page_context:
                    type: object
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /workflowlogs/details:
    get:
      tags:
        - workflow-logs
      operationId: get_workflow_log_details
      summary: Get workflow log details
      description: Get the detailed execution log of a specific workflow run.
      parameters:
        - name: workflow_history_id
          in: query
          description: ID of the workflow history entry.
          required: true
          schema:
            type: string
        - name: timestamp
          in: query
          description: Timestamp of the workflow execution.
          required: true
          schema:
            type: string
        - name: triggered_by
          in: query
          description: ID of the user who triggered the workflow.
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                    readOnly: true
                  message:
                    type: string
                    example: success
                    readOnly: true
                  workflow_logs_details:
                    type: array
                    items:
                      type: object
                  entity_fields:
                    type: object
                  meta_details:
                    type: object
      deprecated: false
      security:
        - Zoho_Auth:
            - ZohoBooks.settings.READ
    parameters:
      - $ref: '#/components/parameters/organization_id'
  /reports/upcomingworkflows:
    get:
      tags:
        - workflow-reports
      operationId: list_upcoming_workflows
      summary: List upcoming workflows
      description: Get a report of upcoming time-based workflow executions.
      parameters:
        - name: entity_ids
          in: query
          description: Comma-separated list of entity IDs to filter.
          required: false
          schema:
            type: string
        - name: entity_type
          in: query
          description: Filter by entity type (e.g., invoice, bill).
          required: false
          schema:
            type: string
          example: invoice
        - name: workflow_id
          in: query
          description: Filter by workflow ID.
          required: false
          schema:
            type: string
