  /api/v1/reports/integrity-check:
    get:
      tags:
      - Financial Reports
      summary: Integrity Check
      description: "Accounting Integrity Validator — run full consistency check.\n\nChecks:\n  1. Trial balance: sum(debit)\
        \ == sum(credit) globally\n  2. Entry balance: every individual journal entry balances\n  3. Orphan lines: journal_lines\
        \ without parent entry\n  4. Broken account refs: lines referencing deleted accounts\n  5. Reversal integrity: reversed\
        \ entries properly linked\n\nReturns all_passed=true if system is fully consistent."
      operationId: integrity_check_api_v1_reports_integrity_check_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
