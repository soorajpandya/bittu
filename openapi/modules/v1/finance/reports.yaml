  /api/v1/reports/drilldown:
    get:
      tags:
      - Financial Reports
      summary: Audit Drilldown
      description: "Audit Drilldown — trace any number back to its source journal entries.\n\nUsage:\n  - From trial balance\
        \ → pass account_id to see all entries for that account\n  - From P&L line → pass reference_type to see all entries\
        \ of that type\n  - From specific transaction → pass reference_id to see the exact entry\n  - CA asks \"show me origin\
        \ of this number\" → this endpoint answers it"
      operationId: audit_drilldown_api_v1_reports_drilldown_get
      security:
      - HTTPBearer: []
      parameters:
      - name: account_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by account (from trial balance)
          title: Account Id
        description: Filter by account (from trial balance)
      - name: reference_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by source type (order, payment, refund, etc.)
          title: Reference Type
        description: Filter by source type (order, payment, refund, etc.)
      - name: reference_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by specific source document ID
          title: Reference Id
        description: Filter by specific source document ID
      - name: from_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: Entry date from
          title: From Date
        description: Entry date from
      - name: to_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: Entry date to
          title: To Date
        description: Entry date to
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
