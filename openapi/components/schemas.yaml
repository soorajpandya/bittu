  - restaurant_id
  - table_id
  - device_id
  title: QRScanIn
app__api__v1__expenses__CategoryCreate:
  properties:
    name:
      type: string
      title: Name
    account_code:
      type: string
      title: Account Code
    description:
      type: string
      title: Description
      default: ''
  type: object
  required:
  - name
  - account_code
  title: CategoryCreate
app__api__v1__expenses__ExpenseCreate:
  properties:
    category_id:
      anyOf:
      - type: string
      - type: 'null'
      title: Category Id
    category_name:
      anyOf:
      - type: string
      - type: 'null'
      title: Category Name
    vendor_id:
      anyOf:
      - type: string
      - type: 'null'
      title: Vendor Id
    vendor_name:
      anyOf:
      - type: string
      - type: 'null'
      title: Vendor Name
    amount:
      type: number
      title: Amount
    tax_amount:
      type: number
      title: Tax Amount
      default: 0
    payment_method:
      type: string
      title: Payment Method
      default: cash
    payment_status:
      type: string
      title: Payment Status
      default: paid
    expense_date:
      anyOf:
      - type: string
        format: date
      - type: 'null'
      title: Expense Date
    description:
      type: string
      title: Description
      default: ''
    receipt_url:
      anyOf:
      - type: string
      - type: 'null'
      title: Receipt Url
    invoice_number:
      anyOf:
      - type: string
      - type: 'null'
      title: Invoice Number
    is_recurring:
      type: boolean
      title: Is Recurring
      default: false
    recurrence:
      anyOf:
      - type: string
      - type: 'null'
      title: Recurrence
  type: object
  required:
  - amount
  title: ExpenseCreate
app__api__v1__orders__CreateOrderIn:
  properties:
    items:
      items:
        $ref: '#/OrderItemIn'
      type: array
      title: Items
    order_type:
      anyOf:
      - type: string
      - type: 'null'
      title: Order Type
    table_id:
      anyOf:
      - type: string
      - type: 'null'
      title: Table Id
    table_number:
      anyOf:
      - type: string
      - type: 'null'
      title: Table Number
    branch_id:
      anyOf:
      - type: string
      - type: 'null'
      title: Branch Id
    coupon_code:
      anyOf:
      - type: string
      - type: 'null'
      title: Coupon Code
    coupon_id:
      anyOf:
      - type: integer
      - type: 'null'
      title: Coupon Id
    customer_id:
      anyOf:
      - type: integer
      - type: 'null'
      title: Customer Id
    customer_name:
      anyOf:
      - type: string
      - type: 'null'
      title: Customer Name
    customer_phone:
      anyOf:
      - type: string
      - type: 'null'
      title: Customer Phone
    delivery_address:
      anyOf:
      - type: string
      - type: 'null'
      title: Delivery Address
    notes:
      anyOf:
      - type: string
      - type: 'null'
      title: Notes
    source:
      anyOf:
      - type: string
      - type: 'null'
      title: Source
      default: pos
    idempotency_key:
      anyOf:
      - type: string
      - type: 'null'
      title: Idempotency Key
  additionalProperties: true
  type: object
  required:
  - items
  title: CreateOrderIn
